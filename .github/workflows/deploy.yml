name: Deploy CLIProxyAPI to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'config.yaml.template'
      - 'docker-compose.yml'
      - 'Dockerfile.biddeed'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Setup and Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          password: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 120s
          command_timeout: 15m
          script: |
            set -e
            export DEBIAN_FRONTEND=noninteractive
            
            echo "=== [1/6] System packages ==="
            if ! command -v docker &>/dev/null; then
              apt-get update -qq
              apt-get install -y -qq curl wget git jq ufw fail2ban ca-certificates
              timedatectl set-timezone America/New_York
              ufw default deny incoming && ufw default allow outgoing
              ufw allow 22/tcp && ufw --force enable
            fi
            
            echo "=== [2/6] Docker ==="
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker && systemctl start docker
            fi
            docker --version
            
            echo "=== [3/6] Clone repos ==="
            mkdir -p /opt
            if [ ! -d /opt/cliproxy-gateway ]; then
              cd /opt && git clone https://github.com/breverdbidder/cliproxy-gateway.git
            else
              cd /opt/cliproxy-gateway && git pull origin main
            fi
            
            if [ ! -d /opt/cliproxy-gateway/CLIProxyAPI ]; then
              cd /opt/cliproxy-gateway && git clone https://github.com/router-for-me/CLIProxyAPI.git
            else
              cd /opt/cliproxy-gateway/CLIProxyAPI && git pull origin main
            fi
            
            echo "=== [4/6] Config ==="
            cd /opt/cliproxy-gateway
            if [ ! -f .env.generated ]; then
              GKEY="biddeed-gw-$(openssl rand -hex 24)"
              MSEC=$(openssl rand -hex 32)
              cp config.yaml.template config.yaml
              sed -i "s/GATEWAY_KEY_PLACEHOLDER/$GKEY/" config.yaml
              sed -i "s/MGMT_SECRET_PLACEHOLDER/$MSEC/" config.yaml
              echo "CLIPROXY_API_KEY=$GKEY" > .env.generated
              echo "MGMT_SECRET=$MSEC" >> .env.generated
              chmod 600 .env.generated
              echo "Generated new keys"
            else
              echo "Keys already exist"
            fi
            cat .env.generated
            
            echo "=== [5/6] Build ==="
            cd /opt/cliproxy-gateway
            docker compose build 2>&1 | tail -15
            
            echo "=== [6/6] Start ==="
            docker compose up -d
            sleep 10
            docker ps
            
            GKEY=$(grep CLIPROXY_API_KEY .env.generated | cut -d= -f2)
            echo ""
            echo "=== Verify ==="
            curl -sf http://127.0.0.1:8317/v1/models -H "Authorization: Bearer $GKEY" | jq '.data | length' && echo "models available" || echo "not responding yet (build may still be running)"
