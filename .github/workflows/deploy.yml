name: Deploy CLIProxyAPI to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'config.yaml.template'
      - 'docker-compose.yml'
      - 'Dockerfile.biddeed'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy Two-Tier Router
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          password: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 120s
          command_timeout: 15m
          envs: ANTHROPIC_API_KEY,DEEPSEEK_API_KEY,GEMINI_API_KEY
          script: |
            set -e
            export DEBIAN_FRONTEND=noninteractive
            
            echo "=== [1/7] System packages ==="
            if ! command -v docker &>/dev/null; then
              apt-get update -qq
              apt-get install -y -qq curl wget git jq ufw fail2ban ca-certificates
              timedatectl set-timezone America/New_York
              ufw default deny incoming && ufw default allow outgoing
              ufw allow 22/tcp && ufw --force enable
            fi
            
            echo "=== [2/7] Docker ==="
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker && systemctl start docker
            fi
            docker --version
            
            echo "=== [3/7] Clone repos ==="
            mkdir -p /opt
            if [ ! -d /opt/cliproxy-gateway ]; then
              cd /opt && git clone https://github.com/breverdbidder/cliproxy-gateway.git
            else
              cd /opt/cliproxy-gateway && git checkout -- . && git pull origin main
            fi
            
            if [ ! -d /opt/cliproxy-gateway/CLIProxyAPI ]; then
              cd /opt/cliproxy-gateway && git clone https://github.com/router-for-me/CLIProxyAPI.git
            else
              cd /opt/cliproxy-gateway/CLIProxyAPI && git pull origin main
            fi
            
            echo "=== [4/7] Generate gateway keys (first run only) ==="
            cd /opt/cliproxy-gateway
            if [ ! -f .env.generated ]; then
              GKEY="biddeed-gw-$(openssl rand -hex 24)"
              MSEC=$(openssl rand -hex 32)
              echo "CLIPROXY_API_KEY=$GKEY" > .env.generated
              echo "MGMT_SECRET=$MSEC" >> .env.generated
              chmod 600 .env.generated
              echo "Generated new gateway keys"
            else
              echo "Gateway keys exist"
            fi
            
            echo "=== [5/7] Build config from template ==="
            cd /opt/cliproxy-gateway
            GKEY=$(grep CLIPROXY_API_KEY .env.generated | cut -d= -f2)
            MSEC=$(grep MGMT_SECRET .env.generated | cut -d= -f2)
            
            # Always rebuild config from template (two-tier)
            cp config.yaml.template config.yaml
            sed -i "s/GATEWAY_KEY_PLACEHOLDER/$GKEY/" config.yaml
            sed -i "s/MGMT_SECRET_PLACEHOLDER/$MSEC/" config.yaml
            
            # Inject DeepSeek key
            if [ -n "$DEEPSEEK_API_KEY" ]; then
              sed -i "s/DEEPSEEK_KEY_PLACEHOLDER/$DEEPSEEK_API_KEY/" config.yaml
              echo "✅ DeepSeek key injected"
            else
              echo "⚠️ No DEEPSEEK_API_KEY secret — using placeholder"
            fi
            
            # Inject Gemini key
            if [ -n "$GEMINI_API_KEY" ]; then
              sed -i "s/GEMINI_KEY_PLACEHOLDER/$GEMINI_API_KEY/" config.yaml
              echo "✅ Gemini key injected"
            else
              echo "⚠️ No GEMINI_API_KEY secret — Gemini FREE tier disabled"
              # Comment out gemini section if no key
              sed -i '/^gemini-api-key:/,/alias: "gemini-flash-preview"$/s/^/#/' config.yaml
            fi
            
            # Inject Anthropic key
            if [ -n "$ANTHROPIC_API_KEY" ]; then
              sed -i "s/ANTHROPIC_KEY_PLACEHOLDER/$ANTHROPIC_API_KEY/" config.yaml
              echo "✅ Anthropic key injected"
            else
              echo "⚠️ No ANTHROPIC_API_KEY secret — Claude tier disabled"
              # Comment out claude section if no key
              sed -i '/^claude-api-key:/,/alias: "claude-haiku"$/s/^/#/' config.yaml
            fi
            
            chmod 644 config.yaml
            echo "Config rebuilt from template"
            
            echo "=== [6/7] Build & Start ==="
            cd /opt/cliproxy-gateway
            docker compose build 2>&1 | tail -10
            docker compose up -d
            sleep 10
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            
            echo "=== [7/7] Verify ==="
            GKEY=$(grep CLIPROXY_API_KEY .env.generated | cut -d= -f2)
            echo ""
            echo "--- Models available ---"
            curl -sf http://127.0.0.1:8317/v1/models \
              -H "Authorization: Bearer $GKEY" | jq -r '.data[].id' 2>/dev/null || echo "Not responding yet"
            echo ""
            echo "--- Health ---"
            curl -sf http://127.0.0.1:8317/v1/models \
              -H "Authorization: Bearer $GKEY" | jq '.data | length' 2>/dev/null && echo "models loaded" || echo "unhealthy"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

