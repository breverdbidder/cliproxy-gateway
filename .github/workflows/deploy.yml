name: Deploy CLIProxyAPI to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'config.yaml.template'
      - 'docker-compose.yml'
      - 'Dockerfile.biddeed'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          password: ${{ secrets.HETZNER_PASSWORD }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 120s
          command_timeout: 10m
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/cliproxy-gateway
            git pull origin main
            cd CLIProxyAPI && git pull origin main && cd ..
            docker compose build --no-cache 2>&1 | tail -10
            docker compose up -d
            sleep 10
            GATEWAY_KEY=$(grep CLIPROXY_API_KEY .env.generated 2>/dev/null | cut -d= -f2 || echo "")
            if [ -n "$GATEWAY_KEY" ]; then
              curl -sf http://127.0.0.1:8317/v1/models \
                -H "Authorization: Bearer $GATEWAY_KEY" | jq '.data | length'
              echo "Deploy OK"
            fi
