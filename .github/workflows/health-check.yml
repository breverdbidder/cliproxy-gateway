name: Weekly Health Check

on:
  schedule:
    - cron: '0 14 * * 0'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check CLIProxyAPI Health
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 120s
          command_timeout: 5m
          script: |
            echo "=== Server Info ==="
            hostname && uptime
            echo ""
            echo "=== Cloud-init status ==="
            cloud-init status 2>/dev/null || echo "no cloud-init"
            echo ""
            echo "=== Docker ==="
            docker ps 2>/dev/null || echo "Docker not ready yet"
            echo ""
            echo "=== CLIProxyAPI ==="
            if [ -f /opt/cliproxy-gateway/.env.generated ]; then
              GATEWAY_KEY=$(grep CLIPROXY_API_KEY /opt/cliproxy-gateway/.env.generated | cut -d= -f2)
              curl -sf http://127.0.0.1:8317/v1/models \
                -H "Authorization: Bearer $GATEWAY_KEY" 2>/dev/null | jq '.' || echo "Service not responding yet"
            else
              echo "Setup not complete — cloud-init still running"
              cat /var/log/cliproxy-setup.log 2>/dev/null | tail -30 || echo "No setup log yet"
            fi
