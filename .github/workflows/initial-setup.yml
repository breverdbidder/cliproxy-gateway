name: Initial Server Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deep Debug
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          password: ${{ secrets.HETZNER_PASSWORD }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 60s
          command_timeout: 3m
          script: |
            cd /opt/cliproxy-gateway
            
            echo "=== 1. No auth ==="
            curl -s -w "\nHTTP_CODE:%{http_code}\n" http://127.0.0.1:8317/ 2>&1
            
            echo ""
            echo "=== 2. Wrong key ==="
            curl -s -w "\nHTTP_CODE:%{http_code}\n" http://127.0.0.1:8317/v1/models \
              -H "Authorization: Bearer wrongkey" 2>&1
            
            echo ""
            echo "=== 3. Right key ==="
            GATEWAY_KEY=$(grep CLIPROXY_API_KEY .env.generated | cut -d= -f2)
            echo "Using key: $GATEWAY_KEY"
            curl -s -w "\nHTTP_CODE:%{http_code}\n" http://127.0.0.1:8317/v1/models \
              -H "Authorization: Bearer $GATEWAY_KEY" 2>&1
            
            echo ""
            echo "=== 4. Raw TCP test ==="
            echo -e "GET /v1/models HTTP/1.1\r\nHost: 127.0.0.1:8317\r\nAuthorization: Bearer $GATEWAY_KEY\r\n\r\n" | nc -w5 127.0.0.1 8317 | head -10
            
            echo ""
            echo "=== 5. Config api-keys ==="
            cat config.yaml | grep -A2 "api-keys"
            
            echo ""
            echo "=== 6. stderr logs ==="
            docker logs biddeed-cliproxy 2>&1 | tail -20
            
            echo "=== DONE ==="
