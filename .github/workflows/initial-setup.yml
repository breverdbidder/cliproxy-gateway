name: Initial Server Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Fix Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          password: ${{ secrets.HETZNER_PASSWORD }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 60s
          command_timeout: 3m
          script: |
            cd /opt/cliproxy-gateway
            
            cat > docker-compose.yml << 'DCEOF'
            services:
              cliproxy:
                build:
                  context: ./CLIProxyAPI
                  dockerfile: /opt/cliproxy-gateway/Dockerfile.biddeed
                container_name: biddeed-cliproxy
                restart: unless-stopped
                ports:
                  - "127.0.0.1:8317:8317"
                volumes:
                  - ./config.yaml:/data/config.yaml:ro
                  - auth-data:/data/auth
                  - log-data:/data/logs
                environment:
                  - TZ=America/New_York
                command: ["CLIProxyAPI", "-c", "/data/config.yaml"]
                tmpfs:
                  - /tmp:size=64M
                security_opt:
                  - no-new-privileges:true
                deploy:
                  resources:
                    limits:
                      cpus: "1.0"
                      memory: 512M
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"
            
            volumes:
              auth-data:
              log-data:
            DCEOF
            
            sed -i 's/^            //' docker-compose.yml
            
            docker compose down
            docker compose up -d
            sleep 8
            
            GATEWAY_KEY=$(grep CLIPROXY_API_KEY .env.generated | cut -d= -f2)
            
            echo "=== Container ==="
            docker ps
            echo ""
            echo "=== Logs ==="
            docker logs biddeed-cliproxy 2>&1 | tail -10
            echo ""
            echo "=== Models Test ==="
            curl -s http://127.0.0.1:8317/v1/models \
              -H "Authorization: Bearer $GATEWAY_KEY" 2>&1 | head -30
            echo ""
            echo "=== Chat Test ==="
            curl -s http://127.0.0.1:8317/v1/chat/completions \
              -H "Authorization: Bearer $GATEWAY_KEY" \
              -H "Content-Type: application/json" \
              -d '{"model":"gemini-2.5-flash","messages":[{"role":"user","content":"say ok"}],"max_tokens":5}' 2>&1 | head -10
            echo "=== DONE ==="
