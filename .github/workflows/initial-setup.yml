name: Initial Server Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Inject API Keys
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          password: ${{ secrets.HETZNER_PASSWORD }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 60s
          command_timeout: 3m
          script: |
            cd /opt/cliproxy-gateway

            echo "=== Injecting real API keys ==="
            sed -i 's/GEMINI_KEY_1_PLACEHOLDER/AIzaSyBzT2DYRXulP_1QzkZJIs7yo-B0uO06nNc/' config.yaml
            sed -i 's/GEMINI_KEY_2_PLACEHOLDER/AIzaSyAWtbRMSsnqozLQymTpQRAV7Fr53VSwT34/' config.yaml
            sed -i 's/GEMINI_KEY_3_PLACEHOLDER/AIzaSyBYqqQUsSa57Q1H-60RYcU8mxAg7mdoijk/' config.yaml
            sed -i 's/DEEPSEEK_KEY_PLACEHOLDER/sk-ef423e40aa164b67ac581d6f6ab51475/' config.yaml

            echo "=== Restarting ==="
            docker compose restart
            sleep 10

            echo "=== Verify ==="
            GATEWAY_KEY=$(grep CLIPROXY_API_KEY .env.generated | cut -d= -f2)
            curl -sf http://127.0.0.1:8317/v1/models \
              -H "Authorization: Bearer $GATEWAY_KEY" | jq '.data[] | .id' 2>/dev/null || echo "Checking..."

            docker ps
            docker logs biddeed-cliproxy --tail 15
            echo "=== DONE ==="
