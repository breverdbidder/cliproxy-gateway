name: Initial Server Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Fix Container Bind Address
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          password: ${{ secrets.HETZNER_PASSWORD }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 60s
          command_timeout: 3m
          script: |
            cd /opt/cliproxy-gateway
            
            # FIX: App must bind 0.0.0.0 INSIDE container
            # Docker port mapping 127.0.0.1:8317:8317 restricts HOST side
            sed -i 's/^host: "127.0.0.1"/host: ""/' config.yaml
            
            echo "=== Config host line ==="
            grep "^host:" config.yaml
            
            docker compose restart
            sleep 8
            
            GATEWAY_KEY=$(grep CLIPROXY_API_KEY .env.generated | cut -d= -f2)
            
            echo "=== Models ==="
            curl -s http://127.0.0.1:8317/v1/models \
              -H "Authorization: Bearer $GATEWAY_KEY" | jq '.data[] | .id' 2>/dev/null || echo "FAIL"
            
            echo ""
            echo "=== Gemini Flash ==="
            curl -s http://127.0.0.1:8317/v1/chat/completions \
              -H "Authorization: Bearer $GATEWAY_KEY" \
              -H "Content-Type: application/json" \
              -d '{"model":"gemini-2.5-flash","messages":[{"role":"user","content":"Reply exactly: BidDeed gateway live"}],"max_tokens":10}' | jq -r '.choices[0].message.content // .error // "no response"' 2>/dev/null || echo "FAIL"
            
            echo ""
            echo "=== DeepSeek ==="
            curl -s http://127.0.0.1:8317/v1/chat/completions \
              -H "Authorization: Bearer $GATEWAY_KEY" \
              -H "Content-Type: application/json" \
              -d '{"model":"deepseek-v3","messages":[{"role":"user","content":"Reply exactly: DeepSeek connected"}],"max_tokens":10}' | jq -r '.choices[0].message.content // .error // "no response"' 2>/dev/null || echo "FAIL"
            
            echo ""
            echo "=== Container ==="
            docker ps --format "{{.Names}} {{.Status}}"
            echo "=== DONE ==="
