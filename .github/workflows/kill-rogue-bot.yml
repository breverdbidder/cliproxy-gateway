name: Kill Rogue Telegram Bot on Hetzner

on:
  workflow_dispatch:

jobs:
  kill-rogue-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Stop agentremote-executor on Hetzner
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          password: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 30s
          command_timeout: 60s
          script: |
            set +e
            echo "=== Stopping agentremote-executor.service ==="
            systemctl stop agentremote-executor.service 2>/dev/null
            systemctl disable agentremote-executor.service 2>/dev/null
            echo "Service stopped and disabled"

            echo ""
            echo "=== Killing any remaining bot processes ==="
            pkill -f 'telegram.*bot' 2>/dev/null || true
            pkill -f 'bot_v[0-9]' 2>/dev/null || true
            pkill -f 'executor.py' 2>/dev/null || true
            echo "Kill commands sent"

            echo ""
            echo "=== Verify clean ==="
            ps aux | grep -iE 'telegram|bot_v|agentremote|executor' | grep -v grep || echo "All clear!"
            systemctl is-active agentremote-executor.service 2>/dev/null || echo "Service is inactive"
            
            echo ""
            echo "DONE — rogue bot eliminated"
