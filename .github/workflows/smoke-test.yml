name: Smoke Test & Wire Consumers

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Smoke Test Gateway
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          password: ${{ secrets.HETZNER_PASSWORD }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 60s
          command_timeout: 5m
          script: |
            cd /opt/cliproxy-gateway
            GATEWAY_KEY=$(grep CLIPROXY_API_KEY .env.generated | cut -d= -f2)
            echo "KEY: ${GATEWAY_KEY:0:20}..."
            
            echo "=== Docker Logs ==="
            docker logs biddeed-cliproxy --tail 20 2>&1
            
            echo ""
            echo "=== Models ==="
            curl -v http://127.0.0.1:8317/v1/models \
              -H "Authorization: Bearer $GATEWAY_KEY" 2>&1 | head -30
            
            echo ""
            echo "=== Gemini Test ==="
            curl -v http://127.0.0.1:8317/v1/chat/completions \
              -H "Authorization: Bearer $GATEWAY_KEY" \
              -H "Content-Type: application/json" \
              -d '{"model":"gemini-2.5-flash","messages":[{"role":"user","content":"say hi"}],"max_tokens":10}' 2>&1 | tail -20
            
            echo ""
            echo "=== DONE ==="

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🏔️ CLIProxyAPI Smoke Test: ${{ job.status }}
            Gateway: 127.0.0.1:8317
