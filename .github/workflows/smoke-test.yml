name: Smoke Test Gateway

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Test Two-Tier Router
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          password: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 60s
          command_timeout: 5m
          script: |
            cd /opt/cliproxy-gateway
            GKEY=$(grep CLIPROXY_API_KEY .env.generated | cut -d= -f2)
            echo "KEY: ${GKEY:0:20}..."
            
            echo ""
            echo "=== Container Status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep -E "(NAMES|biddeed)"
            
            echo ""
            echo "=== Docker Logs (last 20) ==="
            docker logs biddeed-cliproxy --tail 20 2>&1
            
            echo ""
            echo "=== Available Models ==="
            curl -sf http://127.0.0.1:8317/v1/models \
              -H "Authorization: Bearer $GKEY" | jq -r '.data[].id' 2>/dev/null || echo "GATEWAY DOWN"
            
            echo ""
            echo "=== TIER 1: DeepSeek Test ==="
            RESP=$(curl -sf --max-time 30 http://127.0.0.1:8317/v1/chat/completions \
              -H "Authorization: Bearer $GKEY" \
              -H "Content-Type: application/json" \
              -d '{"model":"deepseek-chat","messages":[{"role":"user","content":"respond with exactly: TIER1_OK"}],"max_tokens":10}' 2>&1)
            echo "$RESP" | jq -r '.choices[0].message.content' 2>/dev/null || echo "TIER 1 FAILED: $RESP"
            
            echo ""
            echo "=== TIER 2: Claude Test ==="
            RESP=$(curl -sf --max-time 30 http://127.0.0.1:8317/v1/chat/completions \
              -H "Authorization: Bearer $GKEY" \
              -H "Content-Type: application/json" \
              -d '{"model":"claude-sonnet-4-20250514","messages":[{"role":"user","content":"respond with exactly: TIER2_OK"}],"max_tokens":10}' 2>&1)
            echo "$RESP" | jq -r '.choices[0].message.content' 2>/dev/null || echo "TIER 2 FAILED: $RESP"
            
            echo ""
            echo "=== Config Check ==="
            grep -c "deepseek" /opt/cliproxy-gateway/config.yaml && echo "DeepSeek configured"
            grep -c "claude-api-key" /opt/cliproxy-gateway/config.yaml && echo "Claude configured"
            ls -la /opt/cliproxy-gateway/config.yaml
            
            echo ""
            echo "=== DONE ==="

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🏔️ Two-Tier Router Smoke Test: ${{ job.status }}
            T1: DeepSeek | T2: Claude
            Gateway: 127.0.0.1:8317
